function extractYear(timeStr) {
    if (!timeStr || timeStr === '-') return null;
    const match = timeStr.match(/(\d{4})/);
    if (match) {
        const y = parseInt(match[1], 10);
        if (y >= 1900 && y <= 2025) return y;
    }
    if (timeStr.includes('个月')) return 1922;
    return null;
}

function buildCaption(item) {
    let parts = [];
    if (item.time && item.time !== '-') parts.push(item.time);
    if (item.people && item.people !== '-') parts.push(item.people);
    if (item.description && item.description !== '-') parts.push(item.description);
    return parts.join(' · ') || item.itemName;
}

function getCountry(lat, lng, locationName) {
    if (locationName && locationName !== '-') {
        if (/Montana|Princeton|Stony Brook|Ann Arbor|Rochester|Philadelphia|Niagara|White Sands|Wyoming|Washington|Chicago|芝加哥|普林斯頓|石溪|華府|紐約|舊金山|Yeshiva|美國/.test(locationName)) return '美國';
        if (/Stockholm|斯得哥爾摩/.test(locationName)) return '瑞典';
        if (/Geneva|日內瓦|CERN/.test(locationName)) return '瑞士';
        if (/Leiden/.test(locationName)) return '荷蘭';
        if (/London|倫敦/.test(locationName)) return '英國';
        if (/Riyadh/.test(locationName)) return '沙特阿拉伯';
        if (/梵蒂岡|Vatican/.test(locationName)) return '梵蒂岡';
        if (/Kyoto|東京|日本|日立/.test(locationName)) return '日本';
        if (/漢城|Seoul|南大門/.test(locationName)) return '韓國';
        if (/Taj Mahal|印度/.test(locationName)) return '印度';
        if (/澳洲|Australia/.test(locationName)) return '澳洲';
        if (/台灣|太魯閣/.test(locationName)) return '台灣';
        if (/香港|九龍|中文大學|浸會大學|大學站|香港仔|香港機場/.test(locationName)) return '香港';
        if (/合肥|廈門|清華|北京|上海|昆明|雲南|漢口|天津|長城|黃山|深圳|汕頭|長江|西湖|麗江|北戴河|中山大學|南口|頤和園|人民大會堂|毛主席|中國|青海|Tsinghua|絨線胡同|龍院村|石林/.test(locationName)) return '中國';
    }
    if (lat === null || lng === null) return '';
    if (lat >= 22.1 && lat <= 22.6 && lng >= 113.8 && lng <= 114.4) return '香港';
    if (lat >= 21.5 && lat <= 25.5 && lng >= 119.5 && lng <= 122.5) return '台灣';
    if (lat >= 30 && lat <= 46 && lng >= 129 && lng <= 146) return '日本';
    if (lat >= 33 && lat <= 39 && lng >= 124 && lng <= 130) return '韓國';
    if (lat >= 18 && lat <= 54 && lng >= 73 && lng <= 135) return '中國';
    if (lat >= 24 && lat <= 50 && lng >= -125 && lng <= -66) return '美國';
    if (lat >= 49 && lat <= 61 && lng >= -8 && lng <= 2) return '英國';
    if (lat >= 55 && lat <= 70 && lng >= 11 && lng <= 25) return '瑞典';
    if (lat >= 45.5 && lat <= 48 && lng >= 5.9 && lng <= 10.5) return '瑞士';
    if (lat >= 50.5 && lat <= 53.8 && lng >= 3 && lng <= 7.5) return '荷蘭';
    if (lat >= 6 && lat <= 36 && lng >= 68 && lng <= 98) return '印度';
    if (lat >= 16 && lat <= 33 && lng >= 34 && lng <= 56) return '沙特阿拉伯';
    if (lat >= 36 && lat <= 47 && lng >= 6.5 && lng <= 18.5) return '意大利';
    if (lat >= -44 && lat <= -10 && lng >= 113 && lng <= 154) return '澳洲';
    return '';
}

let locationMap = new Map();
photoData.forEach(item => {
    if (item.lat === null || item.lng === null) return;
    const year = extractYear(item.time);
    if (!year) return;

    const key = `${item.lat.toFixed(3)},${item.lng.toFixed(3)}`;
    const caption = buildCaption(item);
    const country = getCountry(item.lat, item.lng, item.location);

    if (!locationMap.has(key)) {
        locationMap.set(key, {
            name: item.location || '-',
            lat: item.lat,
            lng: item.lng,
            country: country,
            captions: [caption],
            years: [year],
            photoItems: [{ fileName: item.fileName, imageUrl: item.imageUrl, caption: caption }]
        });
    } else {
        let loc = locationMap.get(key);
        loc.captions.push(caption);
        loc.years.push(year);
        if (item.fileName) {
            if (!loc.photoItems.find(p => p.fileName === item.fileName)) {
                loc.photoItems.push({ fileName: item.fileName, imageUrl: item.imageUrl, caption: caption });
            }
        }
        if (item.location && item.location !== '-' && item.location.length > loc.name.length) {
            loc.name = item.location;
        }
        if (!loc.country && country) loc.country = country;
    }
});

let journeyData = [];
locationMap.forEach((value) => {
    if (value.years.length === 0) return;
    const minYear = Math.min(...value.years);
    const maxYr = Math.max(...value.years);
    journeyData.push({
        name: value.name,
        lat: value.lat,
        lng: value.lng,
        country: value.country || '',
        year: minYear,
        maxYear: maxYr,
        captions: value.captions,
        photoItems: value.photoItems,
        location: value.name
    });
});

journeyData.sort((a, b) => a.year - b.year);

let minYear = journeyData.length ? Math.min(...journeyData.map(d => d.year)) : 1922;
let maxYear = journeyData.length ? Math.max(...journeyData.map(d => d.maxYear || d.year)) : 2009;
if (minYear > 1920) minYear = Math.min(minYear, 1922);
if (maxYear < 2010) maxYear = Math.max(maxYear, 2009);

let scene, camera, renderer, globe;
const R = 5;
let currentLang = 'zh';
let currentYear = maxYear;
let isDragging = false, prevMouse = { x: 0, y: 0 };
let targetRotY = Math.PI * 0.75, targetRotX = 0.25;
let currentRotY = targetRotY, currentRotX = targetRotX;
let autoRotate = true, autoRotateTimer = null;
let targetZoom = 13.5, currentZoom = 13.5;
let markerMeshes = [], hitMeshes = [], ringMeshes = [];
let flowSegments = [], totalPathLength = 0;
let headMesh, headGlow, headPtLight, trailMeshes = [];
let pathLineMesh = null;
const TRAIL_COUNT = 25, SPEED = 1.8;

function latLngToVec3(lat, lng, r) {
    const phi = (90 - lat) * Math.PI / 180;
    const theta = (lng + 180) * Math.PI / 180;
    return new THREE.Vector3(-r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
}

function createArcPoints(lat1, lng1, lat2, lng2, r, segments) {
    const v1 = latLngToVec3(lat1, lng1, r), v2 = latLngToVec3(lat2, lng2, r);
    const angle = v1.angleTo(v2);
    const pts = [];
    for (let i = 0; i <= segments; i++) {
        let t = i / segments;
        if (Math.sin(angle) < 0.001) {
            pts.push(v1.clone().lerp(v2, t));
        } else {
            const a = Math.sin((1 - t) * angle) / Math.sin(angle);
            const b = Math.sin(t * angle) / Math.sin(angle);
            pts.push(v1.clone().multiplyScalar(a).add(v2.clone().multiplyScalar(b)));
        }
        pts[pts.length - 1].normalize().multiplyScalar(r + Math.sin(t * Math.PI) * angle * r * 0.12);
    }
    return pts;
}

function getPointOnSegment(segment, distFromStart) {
    const points = segment.points;
    if (points.length === 0) return new THREE.Vector3();
    if (distFromStart <= 0) return points[0].clone();
    if (distFromStart >= segment.length) return points[points.length - 1].clone();
    let accumulated = 0;
    for (let i = 0; i < points.length - 1; i++) {
        const p1 = points[i], p2 = points[i + 1];
        const segLen = p1.distanceTo(p2);
        if (distFromStart <= accumulated + segLen) {
            return p1.clone().lerp(p2, (distFromStart - accumulated) / segLen);
        }
        accumulated += segLen;
    }
    return points[points.length - 1].clone();
}

function rebuildFlow() {
    if (pathLineMesh) { globe.remove(pathLineMesh); pathLineMesh = null; }
    if (headMesh) { globe.remove(headMesh); globe.remove(headGlow); globe.remove(headPtLight); headMesh = null; }
    trailMeshes.forEach(m => globe.remove(m));
    trailMeshes = [];
    const filtered = journeyData.filter(d => d.year <= currentYear);
    if (filtered.length < 2) { flowSegments = []; totalPathLength = 0; return; }
    flowSegments = [];
    totalPathLength = 0;
    for (let i = 0; i < filtered.length - 1; i++) {
        const pts = createArcPoints(filtered[i].lat, filtered[i].lng, filtered[i + 1].lat, filtered[i + 1].lng, R, 100);
        let segLen = 0;
        for (let j = 0; j < pts.length - 1; j++) segLen += pts[j].distanceTo(pts[j + 1]);
        flowSegments.push({ points: pts, length: segLen, startDistance: totalPathLength });
        totalPathLength += segLen;
    }
    const allPoints = [];
    flowSegments.forEach(seg => {
        if (allPoints.length === 0) allPoints.push(...seg.points);
        else allPoints.push(...seg.points.slice(1));
    });
    if (allPoints.length > 1) {
        const lineGeo = new THREE.BufferGeometry().setFromPoints(allPoints);
        pathLineMesh = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0x3a4a6a, transparent: true, opacity: 0.5 }));
        globe.add(pathLineMesh);
    }
    headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.07, 20, 20), new THREE.MeshStandardMaterial({ color: 0xffdd99, emissive: 0xcc8844 }));
    globe.add(headMesh);
    headGlow = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffaa66, transparent: true, opacity: 0.3 }));
    globe.add(headGlow);
    headPtLight = new THREE.PointLight(0xffaa66, 0.7, 3);
    globe.add(headPtLight);
    for (let i = 0; i < TRAIL_COUNT; i++) {
        const sz = 0.045 * (1 - i / TRAIL_COUNT);
        const m = new THREE.Mesh(new THREE.SphereGeometry(Math.max(sz, 0.01), 8, 8), new THREE.MeshBasicMaterial({ color: 0xccaa77, transparent: true, opacity: 0.6 * (1 - i / TRAIL_COUNT) }));
        trailMeshes.push(m);
        globe.add(m);
    }
}

function updateFlow(time) {
    if (flowSegments.length === 0 || totalPathLength === 0 || !headMesh) return;
    let distance = (time * 0.001 * SPEED) % totalPathLength;
    let seg = null, distInSeg = 0;
    for (let s of flowSegments) {
        if (distance >= s.startDistance && distance <= s.startDistance + s.length) {
            seg = s; distInSeg = distance - s.startDistance; break;
        }
    }
    if (!seg) return;
    const pos = getPointOnSegment(seg, distInSeg);
    headMesh.position.copy(pos);
    headGlow.position.copy(pos);
    headPtLight.position.copy(pos);
    for (let i = 0; i < TRAIL_COUNT; i++) {
        let td = distance - (i + 1) * 0.35;
        if (td < 0) td += totalPathLength;
        let ts = null, tdi = 0;
        for (let s of flowSegments) {
            if (td >= s.startDistance && td <= s.startDistance + s.length) { ts = s; tdi = td - s.startDistance; break; }
        }
        if (ts) {
            trailMeshes[i].position.copy(getPointOnSegment(ts, tdi));
            trailMeshes[i].material.opacity = 0.5 * (1 - i / TRAIL_COUNT) * Math.min(1, (distance - td) / 1.5);
        } else trailMeshes[i].material.opacity = 0;
    }
}

function buildMarkers() {
    journeyData.forEach((d, i) => {
        const pos = latLngToVec3(d.lat, d.lng, R * 1.005);
        const m = new THREE.Mesh(new THREE.SphereGeometry(0.028, 24, 24), new THREE.MeshStandardMaterial({ color: 0xe8d5a3, emissive: 0x332200, roughness: 0.3, metalness: 0.7 }));
        m.position.copy(pos);
        m.userData = { index: i };
        globe.add(m);
        markerMeshes.push(m);
        const ring = new THREE.Mesh(new THREE.RingGeometry(0.038, 0.068, 32), new THREE.MeshBasicMaterial({ color: 0xd4b87a, transparent: true, opacity: 0.4, side: THREE.DoubleSide }));
        ring.position.copy(pos);
        ring.lookAt(pos.clone().multiplyScalar(2));
        globe.add(ring);
        ringMeshes.push(ring);
        const h = new THREE.Mesh(new THREE.SphereGeometry(0.28, 8, 8), new THREE.MeshBasicMaterial({ visible: false }));
        h.position.copy(pos);
        h.userData = { index: i };
        globe.add(h);
        hitMeshes.push(h);
    });
}

function updateMarkersVisibility() {
    markerMeshes.forEach((m, i) => {
        const vis = journeyData[i].year <= currentYear;
        m.visible = vis;
        hitMeshes[i].visible = vis;
        if (ringMeshes[i]) ringMeshes[i].visible = vis;
    });
}

let currentPhotoPage = 0;
let currentPhotoList = [];
const PHOTOS_PER_PAGE = 3;

function renderPhotoPage() {
    const container = document.getElementById('photoContainer');
    if (currentPhotoList.length === 0) {
        container.innerHTML = '<div class="photo-empty"><svg class="photo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><div class="photo-text">歷史影像收錄中<br>Historical Archive</div></div>';
        return;
    }
    const totalPages = Math.ceil(currentPhotoList.length / PHOTOS_PER_PAGE);
    const start = currentPhotoPage * PHOTOS_PER_PAGE;
    const pageItems = currentPhotoList.slice(start, start + PHOTOS_PER_PAGE);

    let html = '<div class="photo-gallery">';
    pageItems.forEach(p => {
        html += `<div class="photo-item">
            <img src="${p.imageUrl}" alt="${p.caption}" loading="lazy"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
            <div class="photo-error" style="display:none">⚠ 圖片載入失敗</div>
            <div class="photo-caption">${p.caption}</div>
        </div>`;
    });
    html += '</div>';

    if (totalPages > 1) {
        html += `<div class="photo-nav">
            <button class="photo-nav-btn" onclick="prevPhotoPage()" ${currentPhotoPage === 0 ? 'disabled' : ''}>‹</button>
            <span class="photo-counter">${currentPhotoPage + 1} / ${totalPages}（共 ${currentPhotoList.length} 張）</span>
            <button class="photo-nav-btn" onclick="nextPhotoPage()" ${currentPhotoPage >= totalPages - 1 ? 'disabled' : ''}>›</button>
        </div>`;
    } else {
        html += `<div class="photo-more">共 ${currentPhotoList.length} 張照片</div>`;
    }
    container.innerHTML = html;
}

function prevPhotoPage() {
    if (currentPhotoPage > 0) { currentPhotoPage--; renderPhotoPage(); }
}
function nextPhotoPage() {
    const totalPages = Math.ceil(currentPhotoList.length / PHOTOS_PER_PAGE);
    if (currentPhotoPage < totalPages - 1) { currentPhotoPage++; renderPhotoPage(); }
}

}

function onCanvasClick(e) {
    if (e.target.closest && e.target.closest('.info-panel')) return;
    const rect = renderer.domElement.getBoundingClientRect();
    const mouse = new THREE.Vector2(
        ((e.clientX - rect.left) / rect.width) * 2 - 1,
        -((e.clientY - rect.top) / rect.height) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(hitMeshes.filter(h => h.visible));
    if (hits.length) {
        const idx = hits[0].object.userData.index;
        showInfo(journeyData[idx]);
        focusOnLocation(journeyData[idx].lat, journeyData[idx].lng);
    }
}

function setupTimeline() {
    const slider = document.getElementById('timelineSlider');
    const label = document.getElementById('currentYearLabel');
    slider.min = minYear;
    slider.max = maxYear;
    slider.value = maxYear;
    label.textContent = maxYear;
    document.getElementById('yearDisplay').textContent = minYear + ' → ' + maxYear;
    function update() {
        currentYear = parseInt(slider.value, 10);
        label.textContent = currentYear;
        document.getElementById('yearDisplay').textContent = minYear + ' → ' + currentYear;
        updateMarkersVisibility();
        rebuildFlow();
    }
    slider.addEventListener('input', update);
    update();
}

function setLang(lang) {
    currentLang = lang;
    document.getElementById('btnZh').classList.toggle('active', lang === 'zh');
    document.getElementById('btnEn').classList.toggle('active', lang === 'en');
    document.getElementById('titleZh').textContent = lang === 'zh' ? '楊振寧 — 人生之旅' : 'Yang Zhenning — Life Journey';
    document.getElementById('instruction').textContent = lang === 'zh' ? '拖曳旋轉地球 · 點擊金色球體查看詳情 · 時間軸控制顯示範圍' : 'Drag to rotate · Click gold markers · Timeline controls range';
    if (document.getElementById('infoPanel').classList.contains('active')) closeInfo();
}

function createRealisticEarth() {
    const tl = new THREE.TextureLoader();
    const earthMat = new THREE.MeshPhongMaterial({
        map: tl.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'),
        specularMap: tl.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg'),
        specular: new THREE.Color('grey'), shininess: 5,
        normalMap: tl.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg'),
        normalScale: new THREE.Vector2(0.8, 0.8)
    });
    globe.add(new THREE.Mesh(new THREE.SphereGeometry(R, 128, 128), earthMat));
    const cloudMat = new THREE.MeshPhongMaterial({
        map: tl.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png'),
        transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending
    });
    globe.add(new THREE.Mesh(new THREE.SphereGeometry(R + 0.02, 128, 128), cloudMat));
}

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, currentZoom);
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x060914);
    document.getElementById('scene-container').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x334455, 0.7));
    const dLight = new THREE.DirectionalLight(0x88aacc, 0.5);
    dLight.position.set(5, 3, 5);
    scene.add(dLight);
    scene.add(new THREE.DirectionalLight(0x446688, 0.3).translateX(-3).translateY(-1).translateZ(-4));

    globe = new THREE.Group();
    scene.add(globe);

    const starsGeo = new THREE.BufferGeometry();
    const starsPos = [];
    for (let i = 0; i < 3500; i++) starsPos.push((Math.random() - 0.5) * 300, (Math.random() - 0.5) * 300, (Math.random() - 0.5) * 300);
    starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsPos, 3));
    scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0x888888, size: 0.12, transparent: true, opacity: 0.6 })));

    createRealisticEarth();

    const atmosMat = new THREE.ShaderMaterial({
        vertexShader: `varying vec3 vNormal;void main(){vNormal=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
        fragmentShader: `varying vec3 vNormal;void main(){float i=pow(0.62-dot(vNormal,vec3(0,0,1)),2.0);gl_FragColor=vec4(0.25,0.45,0.75,1.0)*i*0.5;}`,
        blending: THREE.AdditiveBlending, side: THREE.BackSide, transparent: true
    });
    globe.add(new THREE.Mesh(new THREE.SphereGeometry(R * 1.12, 64, 64), atmosMat));

    buildMarkers();
    setupTimeline();

    const cvs = renderer.domElement;
    let dragMoved = false;

    cvs.addEventListener('mousedown', e => {
        isDragging = true; dragMoved = false;
        prevMouse = { x: e.clientX, y: e.clientY };
        autoRotate = false; clearTimeout(autoRotateTimer);
    });
    window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
        if (Math.abs(dx) + Math.abs(dy) > 3) dragMoved = true;
        targetRotY += dx * 0.004;
        targetRotX += dy * 0.004;
        targetRotX = Math.max(-1.2, Math.min(1.2, targetRotX));
        prevMouse = { x: e.clientX, y: e.clientY };
    });
    window.addEventListener('mouseup', () => {
        isDragging = false;
        autoRotateTimer = setTimeout(() => { autoRotate = true; }, 3000);
    });
    cvs.addEventListener('click', e => { if (!dragMoved) onCanvasClick(e); });
    cvs.addEventListener('wheel', e => {
        targetZoom += e.deltaY * 0.008;
        targetZoom = Math.max(8, Math.min(22, targetZoom));
        e.preventDefault();
    }, { passive: false });

    let touchStartDist = 0;
    cvs.addEventListener('touchstart', e => {
        if (e.touches.length === 1) {
            isDragging = true; dragMoved = false;
            prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            autoRotate = false; clearTimeout(autoRotateTimer);
        } else if (e.touches.length === 2) {
            touchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
    }, { passive: true });
    cvs.addEventListener('touchmove', e => {
        if (e.touches.length === 1 && isDragging) {
            const dx = e.touches[0].clientX - prevMouse.x, dy = e.touches[0].clientY - prevMouse.y;
            if (Math.abs(dx) + Math.abs(dy) > 3) dragMoved = true;
            targetRotY += dx * 0.004;
            targetRotX += dy * 0.004;
            targetRotX = Math.max(-1.2, Math.min(1.2, targetRotX));
            prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else if (e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            targetZoom += (touchStartDist - dist) * 0.02;
            targetZoom = Math.max(8, Math.min(22, targetZoom));
            touchStartDist = dist;
        }
        e.preventDefault();
    }, { passive: false });
    cvs.addEventListener('touchend', e => {
        if (e.touches.length === 0) {
            if (!dragMoved && prevMouse.x) {
                onCanvasClick({ clientX: prevMouse.x, clientY: prevMouse.y });
            }
            isDragging = false;
            autoRotateTimer = setTimeout(() => { autoRotate = true; }, 3000);
        }
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate(time) {
        requestAnimationFrame(animate);
        if (autoRotate) targetRotY += 0.0008;
        currentRotY += (targetRotY - currentRotY) * 0.06;
        currentRotX += (targetRotX - currentRotX) * 0.06;
        currentZoom += (targetZoom - currentZoom) * 0.08;
        globe.rotation.y = currentRotY;
        globe.rotation.x = currentRotX;
        camera.position.z = currentZoom;
        markerMeshes.forEach((m, i) => {
            if (m.visible) {
                m.scale.setScalar(0.85 + 0.2 * (0.6 + 0.4 * Math.sin(time * 0.0025 + i * 0.8)));
                m.material.emissiveIntensity = 0.2 + 0.15 * Math.sin(time * 0.003);
            }
        });
        updateFlow(time);
        renderer.render(scene, camera);
    }
    animate(0);
}
init();

console.log(`✅ 已載入 ${photoData.length} 條照片數據`);
console.log(`✅ 已生成 ${journeyData.length} 個地球標記點`);
</script>
</body>
