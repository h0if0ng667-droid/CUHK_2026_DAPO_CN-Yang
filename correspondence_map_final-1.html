   MERGE & CONNECTIONS — ★ MODIFIED ★
   以 dKey（去掉人名後的信件主題）為唯一鍵做全局去重
   ============================================================ */
let ML=[],CONN=[];
function getYr(d){const m=d.match(/\((\d{4})\)\s*$/);return m?+m[1]:null;}
function dKey(d){const i=d.indexOf(' - ');return i>=0?d.substring(i+3).trim():d;}
function dPerson(d){const i=d.indexOf(' - ');return i>=0?d.substring(0,i).trim():'';}

function mergeLocs(){
  const m={};
  LOCS.forEach((loc,i)=>{
    const k=loc.lat.toFixed(4)+','+loc.lon.toFixed(4);
    if(!m[k]){m[k]={names:[loc.name],lat:loc.lat,lon:loc.lon,country:loc.country,count:0,desc:[],origIdx:[i]};}
    else{m[k].names.push(loc.name);m[k].origIdx.push(i);}
    m[k].count+=loc.count;
    m[k].desc=m[k].desc.concat(loc.desc);
  });
  ML=Object.values(m);
}

/* ★ NEW — 取代舊 buildConn + mergeDescriptions ★
   回傳 { dm, locCorr }
     dm      : Map<dKey, [{locIdx,person,year,rawDesc}]>  — 全局通信目錄
     locCorr : Map<locIdx, Map<dKey, corrInfo>>            — 每地點去重後的通信
*/
function buildCorrespondencesAndConnections(ys, ye){
  // 1. 以 dKey 為鍵，跨所有地點收集條目
  const dm = new Map();
  ML.forEach((loc,i)=>{
    loc.desc.forEach(d=>{
      const yr = getYr(d);
      if(yr!==null && (yr<ys||yr>ye)) return;
      const key = dKey(d);
      const person = dPerson(d);
      if(!dm.has(key)) dm.set(key,[]);
      dm.get(key).push({locIdx:i, person, year:yr, rawDesc:d});
    });
  });

  // 2. 根據通信目錄建立連線
  const cm = {};
  dm.forEach((entries)=>{
    const ul = [...new Set(entries.map(e=>e.locIdx))];
    if(ul.length<2) return;
    // hub = Yang 所在地
    let hub = ul[0];
    const ye2 = entries.find(e=>e.person==='CN Yang'||e.person==='Chen Ning Yang'||e.person==='Frank Yang');
    if(ye2) hub = ye2.locIdx;
    if(ul.length===2){
      const a=Math.min(ul[0],ul[1]),b=Math.max(ul[0],ul[1]);
      const ck=a+'|'+b; if(!cm[ck]) cm[ck]={a,b,n:0}; cm[ck].n++;
    } else {
      ul.forEach(l=>{if(l!==hub){
        const a=Math.min(hub,l),b=Math.max(hub,l);
        const ck=a+'|'+b; if(!cm[ck]) cm[ck]={a,b,n:0}; cm[ck].n++;
      }});
    }
  });
  CONN = Object.values(cm);

  // 3. 為每個地點建立去重後的通信清單
  const locCorr = new Map();
  dm.forEach((entries, key)=>{
    // 收集所有涉及的人
    const allPersons = [...new Set(entries.map(e=>e.person))];
    const year = entries[0]?.year;
    // 按地點分組
    const byLoc = new Map();
    entries.forEach(e=>{
      if(!byLoc.has(e.locIdx)) byLoc.set(e.locIdx, new Set());
      byLoc.get(e.locIdx).add(e.person);
    });
    byLoc.forEach((localSet, locIdx)=>{
      if(!locCorr.has(locIdx)) locCorr.set(locIdx, new Map());
      locCorr.get(locIdx).set(key, {
        localPersons: [...localSet],
        allPersons,
        year,
        detail: key
      });
    });
  });

  return { dm, locCorr };
}

/* ============================================================
   PAIR COLORS — unchanged
   ============================================================ */
const PC={};
function pk(c1,c2){return [c1,c2].sort().join('|');}
const PAL={'United States|United States':'#546e7a','China|United States':'#ff9800','United Kingdom|United States':'#00bcd4','France|United States':'#ab47bc','Germany|United States':'#4caf50','India|United States':'#f44336','Israel|United States':'#2196f3','Italy|United States':'#e91e63','Japan|United States':'#ff5722','Netherlands|United States':'#8bc34a','Poland|United States':'#cddc39','Sweden|United States':'#ffeb3b','Switzerland|United States':'#009688','Canada|United States':'#03a9f4','Taiwan(PRC)|United States':'#ff6f00','China|Taiwan':'#ffab40','Unknown|United States':'#78909c','China|Japan':'#f06292','China|China':'#ff8a65','India|United States':'#ef5350','Italy|France':'#ce93d8','Italy|United States':'#e91e63','United Kingdom|United States':'#00bcd4'};
function pairColor(c1,c2){return PAL[pk(c1,c2)]||'#7986cb';}

/* ============================================================
   THREE.JS — unchanged (init, makeStars, globe, etc.)
   ============================================================ */
let scene,camera,renderer,labelRenderer,controls,clock;
let mGrp,aGrp,bGrp,countryGroup;
let mkrs=[],beams=[];
const R=5,SEG=64;

function ll2v(la,lo,r){
  const p=(90-la)*Math.PI/180,t=(lo+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t));
}

let _gt;
function gTex(){
  if(_gt)return _gt;
  const c=document.createElement('canvas');c.width=128;c.height=128;
  const x=c.getContext('2d'),g=x.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.06,'rgba(255,255,255,0.9)');
  g.addColorStop(0.2,'rgba(180,220,255,0.5)');g.addColorStop(0.45,'rgba(80,150,255,0.12)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=g;x.fillRect(0,0,128,128);
  _gt=new THREE.CanvasTexture(c);return _gt;
}

function makeProceduralTex(){
  const c=document.createElement('canvas');c.width=2048;c.height=1024;
  const x=c.getContext('2d');
  const gr=x.createLinearGradient(0,0,0,1024);
  gr.addColorStop(0,'#030810');gr.addColorStop(0.3,'#050d1a');gr.addColorStop(0.5,'#061020');gr.addColorStop(0.7,'#050d1a');gr.addColorStop(1,'#030810');
  x.fillStyle=gr;x.fillRect(0,0,2048,1024);
  x.strokeStyle='rgba(20,50,80,0.08)';x.lineWidth=0.5;
  for(let la=-80;la<=80;la+=15){const y=(90-la)/180*1024;x.beginPath();x.moveTo(0,y);x.lineTo(2048,y);x.stroke();}
  for(let lo=-180;lo<180;lo+=15){const xx=(lo+180)/360*2048;x.beginPath();x.moveTo(xx,0);x.lineTo(xx,1024);x.stroke();}
  return new THREE.CanvasTexture(c);
}

function createCountryLabels() {
  if (countryGroup) scene.remove(countryGroup);
  countryGroup = new THREE.Group();
  countryData.forEach(c => {
    const pos = ll2v(c.lat, c.lon, R + 0.25);
    const div = document.createElement('div');
    div.className = 'country-label';
    div.textContent = lang === 'zh' ? c.nameZh : c.nameEn;
    const label = new THREE.CSS2DObject(div);
    label.position.copy(pos);
    label.userData = { code: c.code, nameZh: c.nameZh, nameEn: c.nameEn };
    countryGroup.add(label);
  });
  scene.add(countryGroup);
}

function updateCountryLabels() {
  if (!countryGroup) return;
  countryGroup.children.forEach(label => {
    label.element.textContent = lang === 'zh' ? label.userData.nameZh : label.userData.nameEn;
  });
}

function init(){
  clock=new THREE.Clock();
  scene=new THREE.Scene();
  scene.background = new THREE.Color(0x0c1420);
  camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,1000);
  camera.position.set(0,4,15);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setClearColor(0x0c1420);
  document.getElementById('container').appendChild(renderer.domElement);

  labelRenderer = new THREE.CSS2DRenderer();
  labelRenderer.setSize(innerWidth, innerHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0px';
  labelRenderer.domElement.style.left = '0px';
  labelRenderer.domElement.style.pointerEvents = 'none';
  labelRenderer.domElement.style.zIndex = '10';
  document.getElementById('container').appendChild(labelRenderer.domElement);

  controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;controls.dampingFactor=0.06;controls.rotateSpeed=0.45;
  controls.minDistance=7;controls.maxDistance=28;controls.enablePan=false;controls.autoRotate=false;

  scene.add(new THREE.AmbientLight(0x446688, 0.8));
  const dl=new THREE.DirectionalLight(0xaaccff,0.8);dl.position.set(5,3,5);scene.add(dl);

  makeStars();
  const gm=new THREE.MeshPhongMaterial({map:makeProceduralTex(),shininess:4,emissive:0x112233});
  const globe=new THREE.Mesh(new THREE.SphereGeometry(R,SEG,SEG),gm);
  scene.add(globe);
  const tl=new THREE.TextureLoader();
  tl.load('https://unpkg.com/three-globe@2.31.0/example/img/earth-night.jpg',t=>{gm.map=t;gm.needsUpdate=true;},undefined,()=>{
    tl.load('https://cdn.jsdelivr.net/npm/three-globe@2.31.0/example/img/earth-night.jpg',t=>{gm.map=t;gm.needsUpdate=true;},undefined,()=>{});
  });
  const am=new THREE.ShaderMaterial({
    vertexShader:'varying vec3 vN;varying vec3 vP;void main(){vN=normalize(normalMatrix*normal);vP=(modelViewMatrix*vec4(position,1.0)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
    fragmentShader:'varying vec3 vN;varying vec3 vP;void main(){vec3 vd=normalize(-vP);float i=pow(1.0-dot(vd,vN),3.2);gl_FragColor=vec4(0.2,0.5,1.0,i*0.35);}',
    transparent:true,side:THREE.BackSide,blending:THREE.AdditiveBlending,depthWrite:false});
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(R*1.14,SEG,SEG),am));

  mGrp=new THREE.Group();aGrp=new THREE.Group();bGrp=new THREE.Group();
  scene.add(mGrp);scene.add(aGrp);scene.add(bGrp);

  mergeLocs();
  createCountryLabels();
  rebuild();

  renderer.domElement.addEventListener('mousemove',onMM);
  renderer.domElement.addEventListener('click',onCl);
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);labelRenderer.setSize(innerWidth,innerHeight);});
  document.getElementById('ld').classList.add('h');
  animate();
}

function makeStars(){
  const g=new THREE.BufferGeometry(),p=new Float32Array(6000*3);
  for(let i=0;i<6000;i++){const r=120+Math.random()*400,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);p[i*3]=r*Math.sin(ph)*Math.cos(th);p[i*3+1]=r*Math.sin(ph)*Math.sin(th);p[i*3+2]=r*Math.cos(ph);}
  g.setAttribute('position',new THREE.BufferAttribute(p,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:0.6,transparent:true,opacity:0.55,sizeAttenuation:true})));
}

function clearViz(){
  [mGrp,aGrp,bGrp].forEach(grp=>{while(grp.children.length){const ch=grp.children[0];if(ch.geometry)ch.geometry.dispose();if(ch.material){if(ch.material.map&&ch.material.map!==gTex())ch.material.map.dispose();ch.material.dispose();}grp.remove(ch);}});
  mkrs=[];beams=[];
}

/* ============================================================
   ★ MODIFIED — rebuild()
   使用全局通信目錄去重後的計數
   ============================================================ */
function rebuild(){
  clearViz();
  const ys=+document.getElementById('rs').value, ye=+document.getElementById('re').value;

  // ★ 用新的全局去重函式
  const { dm, locCorr } = buildCorrespondencesAndConnections(ys, ye);

  // 為每個地點產生去重後的通信列表
  const fML = ML.map((loc,i)=>{
    const corrMap = locCorr.get(i);
    const corrs = corrMap ? Array.from(corrMap.values()) : [];
    return {...loc, corrs, fcount: corrs.length, idx:i};
  }).filter(l=>l.fcount>0);

  const mx=Math.max(...fML.map(l=>l.fcount),1);

  // Markers
  fML.forEach(loc=>{
    const int=loc.fcount/mx;
    const pos=ll2v(loc.lat,loc.lon,R*1.005);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:gTex(),color:new THREE.Color().setHSL(0.12+int*0.05,0.85,0.5+int*0.4),transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,opacity:0.4+int*0.6}));
    const sc=0.15+int*0.55;sp.scale.set(sc,sc,1);sp.position.copy(pos);
    sp.userData={...loc,int,baseScale:sc,isMkr:true};
    mGrp.add(sp);mkrs.push(sp);
    const inner=new THREE.Sprite(new THREE.SpriteMaterial({map:gTex(),color:0xffffff,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,opacity:0.3+int*0.7}));
    const is=0.03+int*0.1;inner.scale.set(is,is,1);inner.position.copy(pos);
    mGrp.add(inner);
  });

  // Arcs — unchanged logic
  CONN.forEach(c=>{
    const la=ML[c.a],lb=ML[c.b];
    const col=pairColor(la.country,lb.country);
    const sv=ll2v(la.lat,la.lon,R*1.003),ev=ll2v(lb.lat,lb.lon,R*1.003);
    const dist=sv.distanceTo(ev);
    const mid=sv.clone().add(ev).multiplyScalar(0.5);
    mid.normalize().multiplyScalar(R+dist*0.35);
    const curve=new THREE.QuadraticBezierCurve3(sv,mid,ev);
    const pts=curve.getPoints(80);
    const ag=new THREE.BufferGeometry().setFromPoints(pts);
    aGrp.add(new THREE.Line(ag,new THREE.LineBasicMaterial({color:new THREE.Color(col),transparent:true,opacity:0.1,blending:THREE.AdditiveBlending,depthWrite:false})));
    const spd=0.08+Math.random()*0.1;
    const phase=Math.random();
    for(let ti=0;ti<3;ti++){
      const bm=new THREE.Sprite(new THREE.SpriteMaterial({map:gTex(),color:new THREE.Color(col),transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,opacity:ti===0?0.9:ti===1?0.4:0.12}));
      const bs=(0.06+(c.n/20)*0.08)*(ti===0?1:ti===1?0.65:0.4);
      bm.scale.set(bs,bs,1);
      bm.userData={pts,prog:phase,spd,trail:ti*0.04,bs};
      bGrp.add(bm);beams.push(bm);
    }
  });

  // ★ 統計：通信條目 = 全局唯一通信數 dm.size
  document.getElementById('vl').textContent=fML.length;
  document.getElementById('ve').textContent=dm.size;          // ← 改為全局去重數
  document.getElementById('vc').textContent=CONN.length;
  document.getElementById('vy').textContent=ys+'–'+ye;
  document.getElementById('ys').textContent=ys;
  document.getElementById('ye').textContent=ye;
  bL();
}

function bL(){
  const el=document.getElementById('lgb');el.innerHTML='';
  const pairs=new Set();
  CONN.forEach(c=>{pairs.add(pk(ML[c.a].country,ML[c.b].country));});
  Array.from(pairs).sort().forEach(p=>{
    const [c1,c2]=p.split('|');
    const col=PAL[p]||'#7986cb';
    const label=c1===c2?(cn(c1)+(lang==='zh'?'國內':' Domestic')):(cn(c1)+' ↔ '+cn(c2));
    const d=document.createElement('div');d.className='li';
    d.innerHTML='<div class="lc" style="background:'+col+';box-shadow:0 0 6px '+col+'"></div><span>'+label+'</span>';
    el.appendChild(d);
  });
}

// ===== FILTER =====
let fTo;
function oF(){
  let s=+document.getElementById('rs').value,e=+document.getElementById('re').value;
  if(s>e){document.getElementById('re').value=s;e=s;}
  document.getElementById('ys').textContent=s;
  document.getElementById('ye').textContent=e;
  clearTimeout(fTo);fTo=setTimeout(rebuild,120);
}

// ===== PANELS =====
function tp(el){el.classList.toggle('c');el.nextElementSibling.classList.toggle('c');}

/* ============================================================
   ★ MODIFIED — showDet()
   顯示去重後的通信目錄，標明本地人 ↔ 遠端通信者
   ============================================================ */
function showDet(loc){
  const det=document.getElementById('det');
  document.getElementById('ddn').textContent=loc.names?loc.names.join(' / '):loc.name;
  document.getElementById('ddc').textContent=cn(loc.country);
  document.getElementById('ddk').textContent=loc.fcount+' '+I18N[lang].items;
  const dl=document.getElementById('dl');dl.innerHTML='';

  const corrs=(loc.corrs||[]).slice().sort((a,b)=>(a.year||0)-(b.year||0));
  corrs.forEach(corr=>{
    const div=document.createElement('div');div.className='di';
    const localStr = corr.localPersons.join(', ');
    const remotePersons = corr.allPersons.filter(p => !corr.localPersons.includes(p));
    const remoteStr = remotePersons.length>0 ? ' ↔ '+remotePersons.join(', ') : '';
    const yr=corr.year;
    div.innerHTML='<span class="dp">'+localStr+'</span>'
      +(remoteStr?'<span style="opacity:.45;font-size:10px">'+remoteStr+'</span>':'')
      +(yr?'<span class="dy">('+yr+')</span>':'')
      +'<div class="dt">'+corr.detail+'</div>';
    dl.appendChild(div);
  });
  det.classList.add('open');
}
function cD(){document.getElementById('det').classList.remove('open');}

/* ============================================================
   INTERACTION — unchanged
   ============================================================ */
const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();
function onMM(ev){
  mouse.x=(ev.clientX/innerWidth)*2-1;mouse.y=-(ev.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(mkrs);
  const tip=document.getElementById('tip');
  if(hits.length>0&&hits[0].object.userData.isMkr){
    const ud=hits[0].object.userData;
    document.getElementById('ttn').textContent=(ud.names||[ud.name]).join(', ');
    document.getElementById('tti').textContent=cn(ud.country)+' · '+(ud.fcount||ud.count)+' '+I18N[lang].items;
    tip.style.display='block';
    let tx=ev.clientX+14,ty=ev.clientY-8;
    if(tx+220>innerWidth)tx=ev.clientX-220;
    if(ty+50>innerHeight)ty=ev.clientY-50;
    tip.style.left=tx+'px';tip.style.top=ty+'px';
    renderer.domElement.style.cursor='pointer';
  }else{tip.style.display='none';renderer.domElement.style.cursor='grab';}
}
function onCl(ev){
  mouse.x=(ev.clientX/innerWidth)*2-1;mouse.y=-(ev.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(mkrs);
  if(hits.length>0&&hits[0].object.userData.isMkr){showDet(hits[0].object.userData);}
}

/* ============================================================
   ANIMATE — unchanged
   ============================================================ */
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(),t=clock.getElapsedTime();
  controls.update();
  beams.forEach(bm=>{
    const u=bm.userData;
    u.prog+=u.spd*dt;if(u.prog>=1)u.prog-=1;
    let p=u.prog-u.trail;if(p<0)p+=1;
    const idx=Math.min(Math.floor(p*(u.pts.length-1)),u.pts.length-1);
    bm.position.copy(u.pts[idx]);
    bm.scale.setScalar(u.bs*(1+0.12*Math.sin(t*4+u.prog*10)));
  });
  mkrs.forEach((m,i)=>{
    if(m.userData.baseScale){m.scale.setScalar(m.userData.baseScale*(1+0.06*Math.sin(t*1.8+i*0.5)));}
  });
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
}

init();
